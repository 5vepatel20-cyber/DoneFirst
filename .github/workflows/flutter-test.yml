name: Flutter CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        # --no-fatal-warnings so pre-existing warnings don't block PRs.
        # New warnings should still be addressed; tighten to `flutter analyze`
        # once the repo is warning-clean.
        run: flutter analyze --no-fatal-warnings

      - name: Run tests
        run: flutter test --reporter expanded
